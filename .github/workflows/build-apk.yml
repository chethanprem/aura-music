name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Grant GITHUB_TOKEN permission to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node ───────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 4. Android SDK ────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Accept SDK licenses ────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Install Capacitor CLI + deps ───────────────────────
      - name: Install dependencies
        run: npm install

      # ── 7. Prepare www/ folder ────────────────────────────────
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      # ── 8. Add Android platform ───────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 9. Sync web assets ────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 10. Fix Gradle wrapper permissions ────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 11. Build debug APK ───────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK as artifact (always) ───────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. Create GitHub Release (push to main only) ─────────
      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Aura Music v1.0.${{ github.run_number }}
          body: |
            ## Aura Music APK

            Auto-built from commit `${{ github.sha }}`

            ### Install
            1. Download `app-debug.apk` below
            2. On your Android device: Settings → Security → Allow Unknown Sources
            3. Open the APK and install

            ### What's included
            - All 7 screens: Home, Search, Library, Playlists, EQ, Now Playing, Settings
            - Local file playback (MP3, FLAC, WAV, AAC, OGG)
            - Google Drive sync
            - 7-band Equalizer with presets
            - Playlists, liked songs, queue, sleep timer
            - Dark glassmorphism UI
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
