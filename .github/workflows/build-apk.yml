name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (required by Gradle) ──────────────────────────
      # No 'cache: gradle' — android/ doesn't exist until cap add runs
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node ───────────────────────────────────────────────
      # No 'cache: npm' — requires package-lock.json in repo; we don't commit it
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 4. Set up Android SDK (before cap add so SDK env is ready) ──
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Accept SDK licenses ────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Install Capacitor CLI + deps ───────────────────────
      - name: Install dependencies
        run: npm install

      # ── 7. Add Android platform ───────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 8. Sync web assets into Android project ───────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 9. Fix Gradle wrapper permissions ─────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ───────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 11. Upload APK artifact ───────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aura-music-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Create GitHub Release (only on push to main) ──────
      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Aura Music v1.0.${{ github.run_number }}
          body: |
            ## Aura Music APK
            
            Auto-built from commit `${{ github.sha }}`
            
            ### Install
            1. Download `aura-music-debug.apk` below
            2. On your Android device: Settings → Security → Allow Unknown Sources
            3. Open the downloaded APK and install
            
            ### What's included
            - Full music player with EQ, shuffle, repeat, sleep timer
            - Local file loading (MP3, FLAC, WAV, AAC, OGG)
            - Google Drive sync
            - Playlists, liked songs, queue management
            - Glassmorphism dark UI with purple accent
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
